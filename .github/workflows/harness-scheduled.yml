name: AI Evaluation Harness — Scheduled Regression

on:
  schedule:
    - cron: "0 6 * * 1"    # Every Monday 06:00 UTC
    - cron: "0 6 * * 4"    # Every Thursday 06:00 UTC
  workflow_dispatch:
    inputs:
      dataset:
        description: Dataset to evaluate
        default: datasets/qa_kaggle.json
        required: false
      model:
        description: Model to evaluate
        default: phi3
        required: false
      limit:
        description: Entry limit (0 = all)
        default: "50"
        required: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  nightly-eval:
    name: Scheduled Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run evaluation
        id: evaluation
        run: |
          DATASET="${{ github.event.inputs.dataset || 'datasets/qa_kaggle.json' }}"
          MODEL="${{ github.event.inputs.model || 'phi3' }}"
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          harness eval \
            -d "$DATASET" \
            -m "$MODEL" \
            --limit "$LIMIT" \
            --risk major \
            --gate warning \
            -o reports/scheduled-report.json \
            --verbose 2>&1 | tee reports/scheduled-output.log
      - name: Generate dashboard
        if: always()
        run: |
          harness monitor dashboard \
            -o reports/scheduled-dashboard.html \
            --title "Scheduled Regression — $(date +%Y-%m-%d)"
      - name: Generate status badge
        if: always()
        run: |
          harness ci badge \
            --store .harness/timeseries.ndjson \
            -o badge.svg
      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-regression
          path: |
            reports/
            .harness/
            badge.svg
