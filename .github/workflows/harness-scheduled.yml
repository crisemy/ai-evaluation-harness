name: AI Evaluation Harness — Scheduled Regression

on:
  schedule:
    - cron: "0 6 */20 * *"    # Every 20 days at 06:00 UTC
  workflow_dispatch:
    inputs:
      dataset:
        description: Dataset to evaluate
        default: tests/fixtures/qa_eval.json
        required: false
      model:
        description: Model to evaluate
        default: phi3
        required: false
      limit:
        description: Entry limit (0 = all)
        default: "50"
        required: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  nightly-eval:
    name: Scheduled Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run evaluation
        id: evaluation
        continue-on-error: true
        run: |
          mkdir -p reports
          DATASET="${{ github.event.inputs.dataset || 'tests/fixtures/qa_eval.json' }}"
          MODEL="${{ github.event.inputs.model || 'phi3' }}"
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          harness eval \
            -d "$DATASET" \
            -m "$MODEL" \
            --limit "$LIMIT" \
            --risk major \
            --gate warning \
            --coverage-min 0.9 \
            --ci-env ci \
            --release-id "${{ github.run_id }}" \
            --execution-id "${{ github.run_attempt }}-${{ github.sha }}" \
            -o reports/scheduled-report.json \
            --verbose 2>&1 | tee reports/scheduled-output.log
      - name: Generate dashboard
        if: always()
        run: |
          harness monitor dashboard \
            -o reports/scheduled-dashboard.html \
            --title "Scheduled Regression — $(date +%Y-%m-%d)"
      - name: KPI baseline comparison
        id: kpi
        if: always()
        run: |
          mkdir -p reports
          harness ci kpi \
            --store .harness/timeseries.ndjson \
            -o reports/kpi-report.json 2>&1 | tee reports/kpi-output.log
      - name: Generate release report
        id: release_report
        if: always()
        run: |
          mkdir -p reports
          harness ci report \
            --store .harness/timeseries.ndjson \
            --risk-level major \
            -o reports/release-report.json 2>&1 | tee reports/release-output.log
      - name: Generate status badge
        if: always()
        run: |
          harness ci badge \
            --store .harness/timeseries.ndjson \
            -o badge.svg
      - name: Rollback trigger
        if: failure()
        run: |
          echo "::warning::CRITICAL: Evaluation pipeline failed. Review artifacts before proceeding."
          echo "Rollback procedure: docs/rollback_checklist.md"
          echo "Last known good version: $(git rev-parse HEAD~1)"
          echo "See artifacts: reports/release-report.json, reports/kpi-report.json"
      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-regression
          path: |
            reports/
            .harness/
            badge.svg
